# Wisp behind a Cloudflare Tunnel (token mode).
#
#   cp .env.deploy.example .env.deploy   # fill it in
#   docker compose --env-file .env.deploy up -d --build
#
# The tunnel is the only ingress: the app publishes no host ports, and
# cloudflared reaches it over the compose network at http://app:3007 — set
# exactly that as the Service URL of your tunnel's public hostname in
# Cloudflare Zero Trust → Networks → Tunnels.

services:
  app:
    build:
      context: .
      args:
        # Public by design; baked into the browser bundle (see Dockerfile).
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    env_file: .env.deploy
    healthcheck:
      # /api/health round-trips to the database, so a container with a dead or
      # misconfigured Supabase reports unhealthy instead of serving 500s.
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:3007/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Tunnel-only by default. Uncomment to also reach the app directly:
    # ports:
    #   - "127.0.0.1:3007:3007"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # From Zero Trust → Networks → Tunnels → your tunnel → token.
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in .env.deploy}
    depends_on:
      app:
        condition: service_healthy

  # Expiry sweeper: without this, expired/exhausted ciphertext is never
  # deleted and the "expiry bounds how long content is reachable" promise
  # silently breaks. Hits POST /api/sweep every 5 minutes over the compose
  # network — no pg_cron or external scheduler to remember.
  sweeper:
    image: curlimages/curl:latest
    restart: unless-stopped
    environment:
      WISP_SWEEP_SECRET: ${WISP_SWEEP_SECRET:?Set WISP_SWEEP_SECRET in .env.deploy}
    command: >-
      sh -c 'while true; do
      curl -fsS -X POST -H "Authorization: Bearer $$WISP_SWEEP_SECRET"
      http://app:3007/api/sweep || echo "[sweeper] sweep request failed";
      sleep 300; done'
    depends_on:
      app:
        condition: service_healthy
